<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Browser - Select Dataset</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dataset-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .dataset-btn {
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .dataset-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>漢 Kanji Browser</h1>
    </header>

    <main>
        <h2>Select Dataset</h2>
        <div class="dataset-selector">
            <button class="dataset-btn" onclick="loadDataset('rtk')">RTK Kanji</button>
            <button class="dataset-btn" onclick="loadDataset('ttc')">TTC Kanji</button>
        </div>
    </main>

    <script>
        function loadDataset(dataset) {
            sessionStorage.setItem('selectedDataset', dataset);
            window.location.href = 'app.html';
        }
    </script>
</body>
</html>
